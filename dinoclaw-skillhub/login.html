<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — DinoClaw SkillHub</title>
<meta name="description" content="使用钉钉扫码登录 DinoClaw 技能社区（OAuth2，与桌面端 DinoClaw 一致）。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"DM Sans","Noto Sans SC",sans-serif;
  -webkit-font-smoothing:antialiased;
  color:#fff;
  overflow:hidden;
}
a{color:inherit;text-decoration:none}
/* Background — same layering idea as App.tsx DingtalkLoginScreen; image optional */
.login-root{position:relative;min-height:100vh;display:flex;flex-direction:column}
.login-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 120% 80% at 50% 20%, rgba(58,155,255,.15), transparent 55%),
    radial-gradient(ellipse 80% 60% at 80% 80%, rgba(38,114,214,.12), transparent 50%),
    linear-gradient(165deg, #0c0e14 0%, #141820 45%, #0a0c12 100%);
}
.login-bg img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.45;
}
.login-bg .blur{
  position:absolute;inset:0;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  background:rgba(10,12,18,.15);
}
.login-bg .glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 500px 300px at 50% 65%, rgba(50,150,250,.06) 0%, transparent 100%);
}
.top-bar{
  position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;
}
.top-bar a.back{
  display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);
  transition:color .2s;
}
.top-bar a.back:hover{color:rgba(255,255,255,.85)}
.top-bar a.back svg{width:16px;height:16px;opacity:.7}
.login-main{
  position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;
  padding:24px 24px 48px;padding-top:min(12vh,120px);
}
.card{
  width:100%;max-width:320px;border-radius:20px;padding:28px 28px 20px;
  background:linear-gradient(170deg, rgba(20,22,28,.75) 0%, rgba(20,22,28,.65) 100%);
  box-shadow:0 16px 48px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.2), inset 0 .5px 0 rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  animation:slideUp .7s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:none}
}
.card h1{text-align:center;font-size:17px;font-weight:500;letter-spacing:.02em;color:rgba(255,255,255,.85)}
.card .sub{text-align:center;font-size:12px;color:rgba(255,255,255,.35);margin-top:6px;letter-spacing:.02em}
.btn-dt{
  width:100%;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:12px;padding:11px 20px;font-size:13px;font-weight:500;font-family:inherit;
  color:rgba(255,255,255,.95);cursor:pointer;transition:filter .2s, transform .15s;
  background:linear-gradient(135deg, #3A9BFF 0%, #2672D6 100%);
  box-shadow:0 4px 16px rgba(50,140,250,.3), 0 1px 3px rgba(0,0,0,.2);
}
.btn-dt:hover:not(:disabled){filter:brightness(1.08)}
.btn-dt:active:not(:disabled){transform:scale(.98)}
.btn-dt:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn-dt svg.shrink{width:16px;height:16px;flex-shrink:0}
.hint{
  margin-top:14px;text-align:center;font-size:11px;line-height:1.55;color:rgba(255,255,255,.35);
}
.err{
  margin-top:12px;padding:10px;border-radius:10px;font-size:11px;line-height:1.5;color:rgba(252,165,165,.95);
  background:rgba(239,68,68,.12);border:1px solid rgba(248,113,113,.15);
  display:none;
}
.err.show{display:block}
.config-note{
  margin-top:14px;padding:10px 12px;border-radius:10px;font-size:11px;line-height:1.5;
  color:rgba(255,255,255,.45);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
}
.config-note code{font-size:10px;word-break:break-all;color:rgba(147,197,253,.9)}
.spin{animation:spin1 .8s linear infinite}
@keyframes spin1{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-root">
  <div class="login-bg" aria-hidden="true">
    <img src="assets/dinoclaw-login-bg.png" alt="" onerror="this.style.display='none'">
    <div class="blur"></div>
    <div class="glow"></div>
  </div>

  <header class="top-bar">
    <a class="back" href="skillhub.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      返回技能社区
    </a>
  </header>

  <main class="login-main">
    <div class="card">
      <h1>DinoClaw</h1>
      <p class="sub">使用钉钉扫码登录</p>

      <button type="button" class="btn-dt" id="btnLogin" aria-busy="false">
        <svg class="shrink" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#fff" fill-opacity=".2"/>
          <path d="M17.2 9.8c-.4-.2-.9-.2-1.6 0-.4.1-.7.3-1 .5l-.5-.8c.5-.4.8-.9.7-1.3-.1-.4-.5-.5-1-.4-.4.1-.7.5-.7.9l.1.3c-.4.1-.9.2-1.3.5l-.3-.3c-.3-.3-.7-.4-1-.1-.3.2-.3.6 0 .9.1.2.3.2.5.2-.2.4-.3.8-.3 1.2-.3.1-.6.2-.9.4-.3.3-.2.7 0 .9.2.2.6.2.8 0 .4.5.9 1 1.5 1.2 0 .2 0 .4.1.5.1.3.4.6.8.6.4 0 .7-.2.7-.6.6.1 1.2 0 1.7-.2.1.3.3.5.7.5.3 0 .6-.3.6-.6 0-.2-.1-.3-.2-.4.4-.4.7-.9.9-1.5.2 0 .4-.1.6-.2.3-.3.3-.7 0-1-.2-.2-.4-.2-.6-.2 0-.5-.1-1-.4-1.3.1-.1.1-.2.1-.4.1-.4-.1-.8-.6-.9z" fill="#fff"/>
        </svg>
        <span id="btnLabel">使用钉钉扫码登录</span>
      </button>

      <p class="hint">登录后可同步你的技能社区身份（需配置钉钉应用与回调地址）。</p>

      <div class="err" id="errBox" role="alert"></div>

      <div class="config-note" id="configNote">
        <strong style="color:rgba(255,255,255,.55)">与桌面端一致：</strong>
        OAuth 授权地址为 <code>https://login.dingtalk.com/oauth2/auth</code>；
        换 token 须在<strong>服务端</strong>调用 <code>https://api.dingtalk.com/v1.0/oauth2/userAccessToken</code>（参考仓库
        <code>src/electron/libs/dingtalk-auth.ts</code>），切勿把 <code>clientSecret</code> 写进网页。
      </div>
    </div>
  </main>
</div>

<script>
(function () {
  // Same authorize endpoint as DinoClaw Electron (dingtalk-auth.ts)
  var AUTHORIZE_URL = "https://login.dingtalk.com/oauth2/auth";

  var qs = new URLSearchParams(window.location.search);
  // Optional: ?client_id=xxx  or set localStorage dingtalk_oauth_client_id
  function getClientId() {
    return (
      qs.get("client_id") ||
      window.localStorage.getItem("dingtalk_oauth_client_id") ||
      ""
    ).trim();
  }

  function getRedirectUri() {
    var explicit = qs.get("redirect_uri");
    if (explicit) return explicit.trim();
    return new URL("auth/dingtalk-callback.html", window.location.href).href;
  }

  function randomState() {
    var a = new Uint8Array(16);
    crypto.getRandomValues(a);
    return Array.from(a, function (b) { return b.toString(16).padStart(2, "0"); }).join("");
  }

  function showErr(msg) {
    var el = document.getElementById("errBox");
    el.textContent = msg;
    el.classList.add("show");
  }

  function setLoading(on) {
    var btn = document.getElementById("btnLogin");
    var label = document.getElementById("btnLabel");
    btn.disabled = on;
    btn.setAttribute("aria-busy", on ? "true" : "false");
    if (on) {
      label.innerHTML = '<svg class="shrink spin" viewBox="0 0 24 24" fill="none" style="width:14px;height:14px"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" opacity=".3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> 正在跳转钉钉…';
    } else {
      label.textContent = "使用钉钉扫码登录";
    }
  }

  document.getElementById("btnLogin").addEventListener("click", function () {
    document.getElementById("errBox").classList.remove("show");

    var clientId = getClientId();
    if (!clientId) {
      showErr("请先在钉钉开放平台创建应用，并将 client_id 通过地址栏 ?client_id= 传入，或执行 localStorage.setItem(\"dingtalk_oauth_client_id\", \"你的ClientId\")。");
      return;
    }

    var redirectUri = getRedirectUri();
    var state = randomState();
    try {
      sessionStorage.setItem("dt_oauth_state", state);
    } catch (e) {}

    var authUrl = new URL(AUTHORIZE_URL);
    authUrl.searchParams.set("response_type", "code");
    authUrl.searchParams.set("client_id", clientId);
    authUrl.searchParams.set("redirect_uri", redirectUri);
    authUrl.searchParams.set("scope", "openid");
    authUrl.searchParams.set("state", state);
    authUrl.searchParams.set("prompt", "consent");

    setLoading(true);
    window.location.href = authUrl.toString();
  });
})();
</script>
</body>
</html>
